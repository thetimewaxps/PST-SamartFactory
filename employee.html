<style>
html, body { overflow-x: hidden; max-width: 100vw; }

/* ── LOGIN OVERLAY ──────────────────────────────────────────── */
#empLoginOverlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 40px 16px 32px;
  overflow-y: auto;
}
.emp-login-card {
  background: var(--bg-card);
  border: 1px solid var(--bc-card);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 36px 32px 32px;
  width: 100%; max-width: 380px;
  text-align: center;
}
.emp-login-logo {
  width: 64px; height: 64px;
  border-radius: 16px;
  overflow: hidden;
  margin: 0 auto 16px;
  background: var(--c1-10);
  display: flex; align-items: center; justify-content: center;
}
.emp-login-logo img { width: 100%; height: 100%; object-fit: contain; }
.emp-login-title {
  font-size: 1.2rem; font-weight: 700; color: var(--t1);
  margin-bottom: 4px;
}
.emp-login-sub {
  font-size: .83rem; color: var(--t3);
  margin-bottom: 24px;
}
.emp-login-field {
  text-align: left; margin-bottom: 14px;
}
.emp-login-field label {
  display: block; font-size: .82rem; color: var(--t2);
  font-weight: 600; margin-bottom: 5px;
}
.emp-login-field input {
  width: 100%; padding: 11px 14px;
  border: 1px solid var(--bc-input);
  border-radius: 10px;
  background: var(--bg-input);
  color: var(--t1);
  font-family: 'Sarabun', sans-serif;
  font-size: .95rem;
  outline: none;
  transition: border-color .2s;
}
.emp-login-field input:focus { border-color: var(--c1); }
.emp-login-btn {
  width: 100%; padding: 13px;
  background: var(--c1); color: #fff;
  border: none; border-radius: 12px;
  font-family: 'Sarabun', sans-serif;
  font-size: 1rem; font-weight: 700;
  cursor: pointer; margin-top: 8px;
  transition: opacity .15s;
}
.emp-login-btn:hover { opacity: .88; }
.emp-login-err {
  min-height: 20px;
  font-size: .82rem; color: #ef4444;
  margin-top: 10px;
}
.emp-login-url-note {
  display: none;
  margin-top: 20px; padding: 12px 14px;
  background: rgba(245,158,11,.1);
  border: 1px solid rgba(245,158,11,.3);
  border-radius: 10px;
  font-size: .82rem; color: #b45309;
  text-align: left;
}
.emp-login-url-note input {
  width: 100%; margin-top: 8px;
  padding: 8px 10px;
  border: 1px solid rgba(245,158,11,.4);
  border-radius: 8px;
  background: var(--bg-input);
  color: var(--t1);
  font-family: 'Sarabun', sans-serif;
  font-size: .85rem;
}
.emp-login-url-save {
  margin-top: 6px; padding: 6px 14px;
  background: rgba(245,158,11,.8); color: #fff;
  border: none; border-radius: 7px;
  font-family: 'Sarabun', sans-serif;
  font-size: .82rem; cursor: pointer;
}
/* PIN eye toggle */
.emp-pin-wrap {
  position: relative;
}
.emp-pin-wrap input {
  padding-right: 44px !important;
}
.emp-pin-eye {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--t3); font-size: 1.1rem; padding: 2px;
  line-height: 1;
}
/* Remember me */
.emp-remember {
  display: flex; align-items: center; gap: 8px;
  margin-top: 12px; font-size: .82rem; color: var(--t2);
  cursor: pointer; user-select: none;
}
.emp-remember input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--c1); }

/* ── TAB BAR (employee) ──────────────────────────────────────── */
.emp-tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 62px;
  background: var(--tabbar);
  border-top: 1px solid var(--bc-div);
  display: flex; align-items: stretch;
  z-index: 100;
  overflow: visible;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.emp-tab-btn {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: 'Sarabun', sans-serif;
  color: var(--t3);
  font-size: .68rem;
  transition: color .15s, background .15s;
  padding: 4px 2px;
  position: relative;
}
.emp-tab-btn .et-icon { font-size: 1.2rem; line-height: 1; position: relative; }
/* badge dot — absolute top-right ของปุ่ม nav */
.emp-tab-btn .loan-notify-dot {
  position: absolute;
  top: 3px; right: 6px;
  margin-left: 0;
  width: 10px; height: 10px;
}
.emp-tab-btn.active { color: var(--c1); }
/* Center elevated slot */
.emp-tab-center-slot {
  flex: 1.2;
  position: relative;
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 8px;
}
.emp-tab-center-btn {
  position: absolute;
  bottom: 10px;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: linear-gradient(145deg, #3b82f6 0%, #1e3a8a 100%);
  border: 3.5px solid var(--tabbar);
  box-shadow: 0 -2px 16px rgba(59,130,246,.45), 0 4px 12px rgba(30,58,138,.35);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  color: #fff;
  font-family: 'Sarabun', sans-serif;
  font-size: .62rem; font-weight: 700;
  gap: 1px;
  transition: transform .15s, box-shadow .15s;
  z-index: 101;
}
.emp-tab-center-btn:active { transform: scale(.93); }
.emp-tab-center-btn.active {
  background: linear-gradient(145deg, #60a5fa 0%, #2563eb 100%);
  box-shadow: 0 -2px 20px rgba(96,165,250,.6), 0 4px 16px rgba(37,99,235,.45);
}
.emp-tab-center-btn .et-icon { font-size: 1.4rem; line-height: 1; }
.emp-tab-center-label {
  position: absolute;
  bottom: -2px;
  font-size: .62rem;
  color: var(--c1);
  font-weight: 700;
  white-space: nowrap;
}

/* ── CONTENT AREA ───────────────────────────────────────────── */
.emp-content {
  max-width: 920px;
  margin: 0 auto;
  padding: 12px 8px 80px;
}

/* ── SLIP PANEL ─────────────────────────────────────────────── */
.emp-slip-card {
  background: var(--bg-card);
  border: 1px solid var(--bc-card);
  border-radius: 16px;
  padding: 24px 20px;
  margin-top: 12px;
}
.emp-slip-title {
  font-size: 1rem; font-weight: 700; color: var(--t1);
  margin-bottom: 18px;
}
.emp-slip-row {
  display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;
  margin-bottom: 16px;
}
.emp-slip-row label {
  font-size: .83rem; color: var(--t2); font-weight: 600;
  display: block; margin-bottom: 5px;
}
.emp-slip-row input[type="month"] {
  padding: 9px 12px;
  border: 1px solid var(--bc-input);
  border-radius: 10px;
  background: var(--bg-input);
  color: var(--t1);
  font-family: 'Sarabun', sans-serif;
  font-size: .92rem;
}
.emp-period-btns {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.emp-period-btn {
  padding: 7px 16px;
  border: 1px solid var(--bc-input);
  border-radius: 9px;
  background: transparent;
  color: var(--t3);
  font-family: 'Sarabun', sans-serif;
  font-size: .82rem;
  cursor: pointer;
  transition: all .15s;
}
.emp-period-btn.sel {
  background: var(--c1); color: #fff; border-color: var(--c1);
}
.emp-slip-view-btn {
  padding: 11px 24px;
  background: var(--c1); color: #fff;
  border: none; border-radius: 11px;
  font-family: 'Sarabun', sans-serif;
  font-size: .92rem; font-weight: 700;
  cursor: pointer;
  transition: opacity .15s;
}
.emp-slip-view-btn:hover { opacity: .88; }

/* ── SESSION BAR ────────────────────────────────────────────── */
.emp-session-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: var(--c1-10);
  border: 1px solid var(--c1-20);
  border-radius: 12px;
  margin-bottom: 14px;
  font-size: .85rem;
}
.emp-session-bar .emp-name { font-weight: 700; color: var(--t1); }
.emp-logout-btn {
  padding: 5px 14px;
  background: transparent;
  border: 1px solid var(--bc-input);
  border-radius: 8px;
  color: var(--t3);
  font-family: 'Sarabun', sans-serif;
  font-size: .8rem;
  cursor: pointer;
}

/* ── HEADER NAV STRIP ───────────────────────────────────────── */
.emp-header-strip {
  background: var(--bg-card);
  border-bottom: 1px solid var(--bc-div);
  padding: 10px 16px;
  display: flex; gap: 8px; flex-wrap: wrap;
}
.emp-nav-chip {
  padding: 6px 16px;
  border: 1px solid var(--bc-input);
  border-radius: 20px;
  background: transparent;
  color: var(--t3);
  font-family: 'Sarabun', sans-serif;
  font-size: .82rem;
  cursor: pointer;
  transition: all .15s;
}
.emp-nav-chip.active {
  background: var(--c1); color: #fff; border-color: var(--c1);
}

/* ซ่อน session bar ที่ hr.js render ใน hrPanel7 — employee.html มีของตัวเองแล้ว */
#hrLoanSessionBar { display: none !important; }

@media print {
  #empLoginOverlay, #empApp > .page-header, .emp-tab-bar { display: none !important; }
}
</style>
</head>

    <div class="emp-login-field">
      <label>เบอร์โทรศัพท์</label>
      <input type="tel" id="empLoginId" placeholder="เช่น 0812345678"
             autocomplete="username" inputmode="tel"
             onkeydown="if(event.key==='Enter')document.getElementById('empLoginPin').focus()">
    </div>
    <div class="emp-login-field">
      <label>PIN (4 หลัก)</label>
      <div class="emp-pin-wrap">
        <input type="password" id="empLoginPin" placeholder="••••"
               autocomplete="current-password" inputmode="numeric" maxlength="8"
               onkeydown="if(event.key==='Enter')empDoLogin()">
        <button type="button" class="emp-pin-eye" onclick="empTogglePin()" title="แสดง/ซ่อน PIN">👁</button>
      </div>
    </div>

    <label class="emp-remember">
      <input type="checkbox" id="empRemember" checked>
      จำการเข้าสู่ระบบ 30 วัน
    </label>

<script>
// ────────────────────────────────────────────────────────────
// EMPLOYEE PORTAL — employee.html v1.5
// ────────────────────────────────────────────────────────────

var _empSlipPeriod = 'all';
var _empCurTab = 'loan';
var EMP_SESSION_LS = 'ptts_emp_session';
var _empCachedSlipAtt = [];      // att array ที่โหลดล่าสุด ใช้ส่งให้ hrOpenPayslip
var _empCachedSlipDeductJson = ''; // deductItems JSON ที่บันทึกตอน confirm

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  // ตั้งค่า month default = เดือนปัจจุบัน
  var now = new Date();
  var yyyymm = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  var slipMonEl = document.getElementById('empSlipMonth');
  if (slipMonEl) slipMonEl.value = yyyymm;

  // ตรวจว่าตั้ง Script URL ไว้หรือยัง
  var url = localStorage.getItem('ptts_script_url') || '';
  if (!url) {
    document.getElementById('empUrlNote').style.display = 'block';
  }

  // ── ตรวจ session ที่จำไว้ ──
  try {
    var saved = JSON.parse(localStorage.getItem(EMP_SESSION_LS) || 'null');
    if (saved && saved.session && saved.expiry && Date.now() < saved.expiry) {
      _hrSession = saved.session;
      empShowApp();
      return; // ข้ามหน้า login
    } else if (saved) {
      localStorage.removeItem(EMP_SESSION_LS); // expired → ล้าง
    }
  } catch(e) {}

  _empCheckOnline();
});

function _empCheckOnline() {
  var url = localStorage.getItem('ptts_script_url') || '';
  if (!url) return;
  var chip = document.getElementById('empConnChip');
  fetch(url + '?action=ping', { method: 'GET' })
    .then(function(r) { return r.json(); })
    .then(function() {
      if (chip) {
        chip.style.display = '';
        chip.textContent = '✓ Online';
        chip.style.cssText = 'font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:999px;background:#4ade80;border:1px solid #16a34a;color:#052e16;letter-spacing:.3px';
      }
    })
    .catch(function() {});
}

// ── SAVE SCRIPT URL ──────────────────────────────────────────
function empAskUrl() {
  var cur = localStorage.getItem('ptts_script_url') || '';
  var v = window.prompt('ใส่ Apps Script URL:\n(คัดลอกจากหน้า Deploy ใน Google Apps Script)', cur);
  if (v === null) return; // กด Cancel
  v = v.trim();
  if (!v || !v.startsWith('http')) {
    alert('URL ไม่ถูกต้อง กรุณาใส่ URL ที่ขึ้นต้นด้วย https://');
    return;
  }
  localStorage.setItem('ptts_script_url', v);
  document.getElementById('empUrlNote').style.display = 'none';
  alert('✅ บันทึก URL แล้ว! กรุณาเข้าสู่ระบบ');
}
function empSaveUrl() { empAskUrl(); }

// ── LOGIN ─────────────────────────────────────────────────────
function empDoLogin() {
  var empId = ((document.getElementById('empLoginId') || {}).value || '').trim();
  var pin   = ((document.getElementById('empLoginPin') || {}).value || '').trim();
  var errEl  = document.getElementById('empLoginErr');

  if (!empId || !pin) {
    errEl.textContent = 'กรุณากรอกรหัสพนักงานและ PIN';
    return;
  }

  // ตรวจ Master PIN ก่อน
  var masterPin = localStorage.getItem('ptts_hr_master_pin') || '';
  if (masterPin && pin === masterPin) {
    _hrSession = { empId: empId, name: 'ผู้จัดการ (admin)', dept: '', role: 'manager', advanceBudget: 0 };
    _empSaveSession();
    empShowApp();
    return;
  }

  // ตรวจ PIN พนักงานผ่าน Code.gs
  var url = localStorage.getItem('ptts_script_url') || '';
  if (!url) {
    errEl.textContent = '';
    document.getElementById('empUrlNote').style.display = 'block';
    return;
  }

  errEl.textContent = '⏳ กำลังตรวจสอบ...';
  _hrPOST('hrLogin', { phone: empId, pin: pin }).then(function(r) {
    if (r.status === 'ok') {
      _hrSession = Object.assign({}, r.emp, { role: 'emp' });
      _empSaveSession();
      empShowApp();
    } else {
      errEl.textContent = r.message || 'PIN ไม่ถูกต้อง';
    }
  }).catch(function(e) {
    errEl.textContent = 'เชื่อมต่อไม่ได้: ' + (e.message || String(e));
  });
}

function _empSaveSession() {
  var remember = (document.getElementById('empRemember') || {}).checked !== false;
  if (!remember || !_hrSession) return;
  var expiry = Date.now() + 30 * 24 * 60 * 60 * 1000; // 30 วัน
  try { localStorage.setItem(EMP_SESSION_LS, JSON.stringify({ session: _hrSession, expiry: expiry })); } catch(e) {}
}

function empTogglePin() {
  var inp = document.getElementById('empLoginPin');
  var eye = document.querySelector('.emp-pin-eye');
  if (!inp) return;
  if (inp.type === 'password') {
    inp.type = 'text';
    if (eye) eye.textContent = '🙈';
  } else {
    inp.type = 'password';
    if (eye) eye.textContent = '👁';
  }
}

function empShowApp() {
  document.getElementById('empLoginOverlay').style.display = 'none';
  document.getElementById('empApp').style.display = '';

  // แสดงโปรไฟล์พนักงาน
  if (_hrSession) {
    var nameEl = document.getElementById('empSessionName');
    var deptEl = document.getElementById('empSessionDept');
    var roleEl = document.getElementById('empSessionRole');
    var avatarEl = document.getElementById('empAvatarZone');
    var nm = _hrSession.name || _hrSession.empId || '?';
    var dp = _hrSession.dept || '';
    var pos = _hrSession.position || '';
    if (nameEl) nameEl.textContent = nm;
    if (deptEl) deptEl.textContent = [dp, pos].filter(Boolean).join(' · ');
    if (roleEl) roleEl.textContent = _hrSession.role === 'manager' ? '👔 ผู้จัดการ' : '👷 พนักงาน';
    if (avatarEl) {
      var initials = nm.trim().charAt(0);
      var thumbUrl = typeof _hrDriveThumb === 'function' ? _hrDriveThumb(_hrSession.profileUrl) : '';
      if (thumbUrl) {
        var img = document.createElement('img');
        img.src = thumbUrl;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover';
        img.onerror = function() { avatarEl.textContent = initials; };
        avatarEl.appendChild(img);
      } else {
        avatarEl.textContent = initials;
      }
    }
  }

  var _logBtn = document.getElementById('empLogoutTopBtn');
  if (_logBtn) _logBtn.style.display = 'flex';

  // โหลด pay cycle config จาก server ก่อน render (พนักงานไม่มี admin localStorage)
  _empLoadPayCfgThenRender();

  _empCheckOnline();
  _empLoadHeaderStats();
  _empCheckLoanBadgeFromServer(); // ตรวจจาก server (ไม่พึ่ง admin localStorage)
}

// โหลด pay cfg จาก server → บันทึกลง localStorage → render slip tab
function _empLoadPayCfgThenRender() {
  _hrGET('getHRPayCfg')
    .then(function(res) {
      if (res && res.cfg) {
        localStorage.setItem('ptts_hr_pay_cfg', JSON.stringify(res.cfg));
        // อัปเดต label ปุ่มงวด ให้ตรงกับ HR ตั้งไว้
        var pc = res.cfg;
        var b1 = document.getElementById('empPeriodBtnP1');
        var b2 = document.getElementById('empPeriodBtnP2');
        if (b1 && pc.p1) b1.textContent = 'งวด 1 (' + pc.p1.start + '–' + pc.p1.end + ')';
        if (b2 && pc.p2) b2.textContent = 'งวด 2 (' + pc.p2.start + '–' + pc.p2.end + ')';
      }
      empTabSwitch('slip');
    })
    .catch(function() { empTabSwitch('slip'); });
}

// ── HEADER STATS ──────────────────────────────────────────────
function _empLoadHeaderStats() {
  var statsEl = document.getElementById('empHeaderStats');
  if (!statsEl || !_hrSession || _hrSession.role !== 'emp') return;
  var budget = parseFloat(_hrSession.advanceBudget || 0);
  var empId  = _hrSession.empId;
  Promise.all([
    _hrGET('getLoanRequests', { empId: empId }),
    _hrGET('getHRLoanContracts', { empId: empId })
  ]).then(function(results) {
    var loans     = (results[0] && results[0].data) || [];
    var contracts = (results[1] && results[1].data) || [];

    // คำนวณวงเงินเบิก
    var nowYM = (function(){ var d=new Date(); return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+String(d.getMonth()+1); })();
    var usedAmt = 0;
    loans.forEach(function(l) {
      if (l.type !== 'advance' || l.status === 'rejected') return;
      var rd = String(l.requestDate||'');
      var ym = '';
      if (rd.length >= 10 && rd[2] === '/') {
        var by = parseInt(rd.slice(6,10)); var cy = by > 2500 ? by-543 : by;
        ym = cy + '-' + rd.slice(3,5);
      } else { var dp=new Date(rd); if(!isNaN(dp)) ym=dp.getFullYear()+'-'+String(dp.getMonth()+1).padStart(2,'0'); }
      if (ym === nowYM) usedAmt += parseFloat(l.amount||0);
    });
    var remaining = Math.max(0, budget - usedAmt);
    var pct = budget > 0 ? Math.min(100, Math.round(usedAmt/budget*100)) : 0;
    var barClr = pct >= 90 ? '#fca5a5' : pct >= 60 ? '#fde68a' : '#6ee7b7';

    // คำนวณยอดกู้ค้าง
    var totalOutstanding = 0;
    var installAmt = 0, payDays = '';
    contracts.filter(function(c){ return c.status === 'active'; }).forEach(function(c) {
      totalOutstanding += parseFloat(c.outstanding||0);
      installAmt += parseFloat(c.installmentAmt||0);
      if (!payDays && c.payDays) payDays = c.payDays;
    });

    function fmt(n) { return Number(n).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:0}); }

    var box1 = budget > 0
      ? '<div style="background:rgba(255,255,255,.15);border-radius:10px;padding:7px 10px">'
          + '<div style="font-size:10px;color:rgba(255,255,255,.75);margin-bottom:2px">วงเงินเบิก/เดือน</div>'
          + '<div style="font-size:13px;font-weight:700;color:#fff">฿'+fmt(usedAmt)+' / ฿'+fmt(budget)+'</div>'
          + '<div style="background:rgba(255,255,255,.2);border-radius:99px;height:4px;margin:4px 0;overflow:hidden">'
              + '<div style="height:100%;width:'+pct+'%;background:'+barClr+';border-radius:99px"></div>'
          + '</div>'
          + '<div style="font-size:10px;color:rgba(255,255,255,.75)">เหลือ ฿'+fmt(remaining)+'</div>'
        + '</div>'
      : '';

    var box2 = totalOutstanding > 0
      ? '<div style="background:rgba(255,255,255,.15);border-radius:10px;padding:7px 10px">'
          + '<div style="font-size:10px;color:rgba(255,255,255,.75);margin-bottom:2px">ยอดกู้คงค้าง</div>'
          + '<div style="font-size:13px;font-weight:700;color:#fde68a">฿'+fmt(totalOutstanding)+'</div>'
          + (installAmt > 0 ? '<div style="font-size:10px;color:rgba(255,255,255,.7)">หักงวดละ ฿'+fmt(installAmt)+(payDays ? ' · วันที่ '+payDays : '')+'</div>' : '')
        + '</div>'
      : '';

    if (box1) {
      statsEl.innerHTML = box1;
      statsEl.style.display = 'flex';
    }
  }).catch(function() {});
}

// ── LOGOUT ────────────────────────────────────────────────────
function empLogoutConfirm() {

}
function empLogout() {
  var _logBtn = document.getElementById('empLogoutTopBtn');
  if (_logBtn) _logBtn.style.display = 'none';
  _hrSession = null;
  localStorage.removeItem(EMP_SESSION_LS); // ล้าง session ที่จำไว้
  document.getElementById('empApp').style.display = 'none';
  document.getElementById('empLoginOverlay').style.display = '';
  var idEl  = document.getElementById('empLoginId');
  var pinEl = document.getElementById('empLoginPin');
  var errEl = document.getElementById('empLoginErr');
  if (idEl)  idEl.value  = '';
  if (pinEl) { pinEl.value = ''; pinEl.type = 'password'; }

// Override hrLogout (defined in hr.js) — ใน employee.html ให้ออกจากระบบทั้งหน้า
function hrLogout() {
  empLogout();

// ── TAB SWITCHING ─────────────────────────────────────────────
function empTabSwitch(tab) {
  _empCurTab = tab;

  var tabs = ['loan', 'contract', 'slip', 'cal', 'summary'];
  var panMap = {
    loan:     'hrPanel7',
    contract: 'empPanelContract',
    slip:     'empPanelSlip',
    cal:      'hrPanel6',
    summary:  'empPanelSummary'
  };

  // อัป chip buttons (top)
  tabs.forEach(function(t) {
    var btn = document.getElementById('empTabBtn-' + t);
    if (btn) {
      btn.classList.toggle('active', t === tab);
    }
  });

  // อัป bottom tab buttons (mobile)
  tabs.forEach(function(t) {
    var btn = document.getElementById('empBotBtn-' + t);
    if (btn) {
      btn.classList.toggle('active', t === tab);
    }
  });

  // แสดง/ซ่อน panels
  tabs.forEach(function(t) {
    var el = document.getElementById(panMap[t]);
    if (el) el.style.display = t === tab ? '' : 'none';
  });

  // เรียก render function
  if (tab === 'loan')     _hrRenderLoans();
  if (tab === 'contract') { _empClearLoanBadge(); _empRenderContracts(); }
  if (tab === 'cal')      _hrRenderCal();
  if (tab === 'summary')  _empRenderAttSummary();
  if (tab === 'slip')     _empRenderSlip();
}

// ── Loan notify badge (employee side) ──
var _LOAN_NOTIFY_KEY = 'ptts_loan_notify';
var _LOAN_SEEN_KEY   = 'ptts_loan_last_seen'; // ISO date "YYYY-MM-DD" ครั้งสุดท้ายที่เห็น

// ตรวจจาก server ว่ามีการหักงวดใหม่ไหม (ไม่พึ่ง admin localStorage)
function _empCheckLoanBadgeFromServer() {
  var sess = _hrSession;
  if (!sess || !sess.empId) return;
  var url = (typeof SCRIPT_URL !== 'undefined' && SCRIPT_URL) || localStorage.getItem('ptts_script_url') || '';
  if (!url) return;
  var lastSeen = localStorage.getItem(_LOAN_SEEN_KEY) || '1970-01-01';
  fetch(url + '?action=getHRLoanPayments&empId=' + encodeURIComponent(sess.empId) + '&_t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var pays = (data && data.data) ? data.data : [];
      // ถ้ามี payment ที่ payDate หลัง lastSeen → แสดง badge
      var hasNew = pays.some(function(p) {
        var d = (p.payDate || '').replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$2-$1'); // dd/MM/yyyy → yyyy-MM-dd
        return d > lastSeen;
      });
      if (hasNew) {
        try { localStorage.setItem(_LOAN_NOTIFY_KEY, '1'); } catch(e) {}
      }
      _empRefreshLoanBadge();
    })
    .catch(function() {});
}

function _empRefreshLoanBadge() {
  var btn = document.getElementById('empBotBtn-contract');
  var topBtn = document.getElementById('empTabBtn-contract');
  try {
    var has = localStorage.getItem(_LOAN_NOTIFY_KEY);
    [btn, topBtn].forEach(function(b) {

  p.innerHTML = '<div style="padding:16px 0;text-align:center;color:#6b7280">⏳ กำลังโหลด...</div>';
  var empId = _hrSession.empId;
  Promise.all([
    _hrGET('getHRLoanContracts', { empId: empId }),
    _hrGET('getHRLoanPayments',  { empId: empId })
  ]).then(function(res) {
    _hrLoanContracts        = (res[0] && res[0].data) || [];

      p.innerHTML = '<div style="text-align:center;padding:48px 16px;color:#9ca3af;font-size:.95rem">📋 ยังไม่มีสัญญาเงินกู้ที่ active</div>';

    var cards = active.map(function(lc) {
      var paid = lc.originalAmount - lc.outstanding;
      var pct  = lc.originalAmount > 0 ? Math.min(100, Math.round(paid / lc.originalAmount * 100)) : 0;
      var myPays = (_hrLoanContractPayments||[]).filter(function(pp){ return pp.loanId === lc.loanId; });
      var remPeriods = lc.installmentAmt > 0 ? Math.ceil(lc.outstanding / lc.installmentAmt) : '—';
      var typeBadge = lc.type === 'advance'
        ? '<span style="background:#e0e7ff;color:#3730a3;border-radius:6px;padding:2px 8px;font-size:.75rem;font-weight:700">เบิก</span>'
        : '<span style="background:#fce7f3;color:#9d174d;border-radius:6px;padding:2px 8px;font-size:.75rem;font-weight:700">กู้</span>';
      // ── ตารางผ่อน ──
      var paidSorted = myPays.slice().sort(function(a,b){ return (a.payDate||'').localeCompare(b.payDate||''); });
      var tableRows = '';
      // แถวที่จ่ายแล้ว
      paidSorted.forEach(function(pp, idx) {
        tableRows +=
          '<tr style="background:#f0fdf4">' +
            '<td style="padding:5px 8px;text-align:center;color:#166534;font-weight:700">' + (idx+1) + '</td>' +
            '<td style="padding:5px 8px;color:#166534">' + (pp.payDate || '—') + '</td>' +
            '<td style="padding:5px 8px;text-align:right;color:#166534;font-weight:600">฿' + _hrFmt(pp.amount) + '</td>' +
            '<td style="padding:5px 8px;text-align:right;color:#166534">฿' + _hrFmt(pp.outstandingAfter) + '</td>' +
            '<td style="padding:5px 8px;color:#16a34a;font-size:.72rem">' + (pp.periodLabel||pp.note||'') + '</td>' +
          '</tr>';
      });
      // แถวโปรเมณการที่เหลือ
      if (lc.installmentAmt > 0 && lc.outstanding > 0) {
        var remAmt = lc.outstanding;
        var futureIdx = paidSorted.length + 1;
        while (remAmt > 0) {
          var amt = Math.min(remAmt, lc.installmentAmt);
          remAmt = Math.max(0, remAmt - amt);
          tableRows +=
            '<tr style="background:#f8fafc">' +
              '<td style="padding:5px 8px;text-align:center;color:#64748b;font-weight:500">' + futureIdx + '</td>' +
              '<td style="padding:5px 8px;color:#64748b;font-size:.75rem">วันที่ ' + (lc.payDays||'—') + '</td>' +
              '<td style="padding:5px 8px;text-align:right;color:#475569;font-weight:500">฿' + _hrFmt(amt) + '</td>' +
              '<td style="padding:5px 8px;text-align:right;color:#475569">฿' + _hrFmt(remAmt) + '</td>' +
              '<td style="padding:5px 8px;color:#94a3b8;font-size:.72rem">📅 ประมาณการ</td>' +
            '</tr>';
          futureIdx++;
          if (futureIdx > paidSorted.length + 60) break; // safety cap
        }
      }
      var repayTable =
        '<div style="margin-top:4px">' +
          '<div style="font-size:.78rem;font-weight:700;color:#374151;margin-bottom:6px">📊 ตารางผ่อนชำระ</div>' +
          '<div style="overflow-x:auto;border-radius:8px;border:1px solid #e5e7eb">' +
            '<table style="width:100%;border-collapse:collapse;font-size:.78rem;font-family:\'Sarabun\',sans-serif">' +
              '<thead>' +
                '<tr style="background:#f9fafb;border-bottom:1px solid #e5e7eb">' +
                  '<th style="padding:6px 8px;text-align:center;color:#6b7280;font-weight:600;white-space:nowrap">งวด</th>' +
                  '<th style="padding:6px 8px;text-align:left;color:#6b7280;font-weight:600;white-space:nowrap">วันที่หัก</th>' +
                  '<th style="padding:6px 8px;text-align:right;color:#6b7280;font-weight:600;white-space:nowrap">จำนวน</th>' +
                  '<th style="padding:6px 8px;text-align:right;color:#6b7280;font-weight:600;white-space:nowrap">คงค้าง</th>' +
                  '<th style="padding:6px 8px;text-align:left;color:#6b7280;font-weight:600">หมายเหตุ</th>' +
                '</tr>' +
              '</thead>' +
              '<tbody>' + tableRows + '</tbody>' +
            '</table>' +
          '</div>' +
        '</div>';

      return '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px">' +
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
          typeBadge +
          '<span style="font-size:.82rem;font-weight:700;color:#374151">' + lc.loanId + '</span>' +
          '<span style="font-size:.78rem;color:#6b7280">📌 ' + lc.reason + '</span>' +
        '</div>' +
        '<div style="background:linear-gradient(135deg,#1e3a5f,#1d4ed8);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px">' +
          '<div>' +
            '<div style="font-size:.68rem;color:rgba(255,255,255,.7);margin-bottom:1px">ยอดกู้รวมทั้งหมด</div>' +
            '<div style="font-size:1.2rem;font-weight:800;color:#fff">฿' + _hrFmt(lc.originalAmount) + '</div>' +
          '</div>' +
          '<div style="text-align:right">' +
            '<div style="font-size:.68rem;color:rgba(255,255,255,.7);margin-bottom:1px">วันทำสัญญา</div>' +
            '<div style="font-size:.85rem;font-weight:700;color:#93c5fd">' + (typeof _lcFmtDate==='function'?_lcFmtDate(lc.startDate):(lc.startDate||'—')) + '</div>' +
          '</div>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
          '<div style="background:linear-gradient(135deg,#fee2e2,#fecaca);border-radius:10px;padding:12px">' +
            '<div style="font-size:.72rem;color:#9b1c1c;margin-bottom:2px">ยอดคงค้าง</div>' +
            '<div style="font-size:1.3rem;font-weight:800;color:#dc2626">฿' + _hrFmt(lc.outstanding) + '</div>' +
          '</div>' +
          '<div style="background:linear-gradient(135deg,#dbeafe,#bfdbfe);border-radius:10px;padding:12px">' +
            '<div style="font-size:.72rem;color:#1e40af;margin-bottom:2px">หักต่องวด</div>' +
            '<div style="font-size:1.3rem;font-weight:800;color:#1d4ed8">฿' + _hrFmt(lc.installmentAmt) + '</div>' +
            '<div style="font-size:.7rem;color:#3b82f6;margin-top:2px">วันที่ ' + lc.payDays + ' | เหลือ ~' + remPeriods + ' งวด</div>' +
          '</div>' +
        '</div>' +
        '<div>' +
          '<div style="display:flex;justify-content:space-between;font-size:.75rem;color:#9ca3af;margin-bottom:4px">' +
            '<span>ผ่อนไปแล้ว ' + pct + '%</span>' +
            '<span>' + myPays.length + ' งวด จ่ายแล้ว</span>' +
          '</div>' +
          '<div style="background:#e5e7eb;border-radius:99px;height:8px;overflow:hidden">' +
            '<div style="height:100%;width:' + pct + '%;background:' + (pct>=100?'#10b981':'#6366f1') + ';border-radius:99px;transition:width .4s"></div>' +
          '</div>' +
        '</div>' +
        repayTable +
        '<button onclick="hrViewLoanContract(\'' + lc.loanId + '\')" ' +
          'style="width:100%;margin-top:4px;background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;border:none;border-radius:8px;padding:9px;cursor:pointer;font-family:\'Sarabun\',sans-serif;font-size:.88rem;font-weight:700">' +
          '📄 ดูสัญญาอย่างเป็นทางการ' +
        '</button>' +
      '</div>';
    }).join('');
    p.innerHTML = '<div style="padding:0 4px">' +
      '<div style="font-size:1.05rem;font-weight:700;color:#111827;margin-bottom:14px">📋 สัญญาเงินกู้ของฉัน</div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">' + cards + '</div>' +
    '</div>';
  }).catch(function(e) {
    p.innerHTML = '<div style="padding:20px;color:#dc2626">โหลดไม่สำเร็จ: ' + e.message + '</div>';
  });
}

// ── SLIP PANEL ─────────────────────────────────────────────────
function _empRenderSlip() {
  var now = new Date();
  var slipMonEl = document.getElementById('empSlipMonth');
  if (slipMonEl && !slipMonEl.value)
    slipMonEl.value = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');

  // Auto-select งวดตามวันที่ปัจจุบัน
  var pc = (typeof _hrPayCfg === 'function') ? _hrPayCfg() : { mode: 'all' };
  if (pc.mode === 'semi') {
    var d = now.getDate();
    var autoPeriod = (d >= pc.p1.start && d <= pc.p1.end) ? 'p1' : 'p2';
    _empSlipPeriod = autoPeriod;
    document.querySelectorAll('.emp-period-btn').forEach(function(b) {
      b.classList.toggle('sel', b.getAttribute('data-val') === autoPeriod);

  _empLoadSlipPreview();
}

}

function empViewSlip() {
  if (!_hrSession) return;

  if (!mon) return;

  var _prevAtt = _hrAtt;
  _hrAtt = _empCachedSlipAtt;
  hrOpenPayslip(_hrSession.empId, mon, _empSlipPeriod, _empCachedSlipDeductJson || undefined);
  _hrAtt = _prevAtt;
}

function _empLoadSlipPreview() {
  var preview = document.getElementById('empSlipPreview');
  if (!preview || !_hrSession) return;
  var mon = (document.getElementById('empSlipMonth') || {}).value || '';
  if (!mon) return;

  preview.innerHTML = '<div style="padding:20px;text-align:center;color:var(--t3);font-size:.85rem">⏳ กำลังโหลด...</div>';

  var months = [mon];
  var pc = (typeof _hrPayCfg === 'function') ? _hrPayCfg() : { mode: 'all' };
  if (_empSlipPeriod === 'p2' && pc.mode === 'semi') {
    var mp = mon.split('-').map(Number);
    var pM = mp[1] === 1 ? 12 : mp[1] - 1;
    var pY = mp[1] === 1 ? mp[0] - 1 : mp[0];
    months.push(pY + '-' + String(pM).padStart(2, '0'));
  }

  var empId = String(_hrSession.empId);
  Promise.all([
    Promise.all(months.map(function(m) { return _hrGET('getHRAttendance', { month: m }); })),
    (_hrEmps && _hrEmps.length) ? Promise.resolve({ data: _hrEmps }) : _hrGET('getHREmployees'),
    _hrGET('getSalaryPayments', { empId: empId }),
    _hrGET('getHRLoanContracts', { empId: empId }).catch(function(){ return {data:[]}; }),
    _hrGET('getLoanRequests', { empId: empId, status: 'approved' }).catch(function(){ return {data:[]}; })
  ]).then(function(results) {
    var allAtt = results[0].reduce(function(a, r) { return a.concat(r.data || []); }, []);
    if (results[1] && results[1].data) _hrEmps = results[1].data;
    var _lc = results[3]; _hrLoanContracts = Array.isArray(_lc) ? _lc : ((_lc && _lc.data) ? _lc.data : []);
    var _lr = results[4]; _hrLoans = Array.isArray(_lr) ? _lr : ((_lr && _lr.data) ? _lr.data : []);
    var salPays = (results[2] && results[2].data) || [];

    // กรองประวัติโอนเดือนนี้ + period นี้ (newest first จาก server แล้ว)
    var thisPays = salPays.filter(function(p) {
      if (p.month !== mon) return false;
      if (_empSlipPeriod !== 'all' && p.period !== 'all' && p.period !== _empSlipPeriod) return false;
      return true;
    });

    var att = allAtt.filter(function(r) { return String(r.empId) === empId; });
    _empCachedSlipAtt = allAtt; // cache ทั้งหมด (ก่อน filter) เพื่อส่งให้ hrOpenPayslip
    att = (typeof _hrFilterByPeriod === 'function') ? _hrFilterByPeriod(att, _empSlipPeriod, mon) : att;
    var empRec = (_hrEmps || []).find(function(e) { return String(e.empId) === empId; }) || null;
    var ps = (typeof _hrCalcPayslip === 'function') ? _hrCalcPayslip(empRec, att, mon, _empSlipPeriod) : null;

    // ── ถ้ายังไม่มีบันทึกโอน → แสดง "เงินเดือนยังไม่ออก" ──
    if (!thisPays.length) {
      _empCachedSlipDeductJson = ''; // ไม่มีบันทึกโอน → ล้าง deduct cache
      var thMon = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
      var monParts = mon.split('-');
      var monLabel = thMon[parseInt(monParts[1])||0] + ' ' + (parseInt(monParts[0])+543);
      var prdLabel = _empSlipPeriod === 'p1' ? ' งวด 1' : _empSlipPeriod === 'p2' ? ' งวด 2' : '';
      preview.innerHTML =
        '<div style="border-radius:14px;border:2px dashed #fbbf24;background:#fffbeb;padding:28px 20px;text-align:center;margin:8px 0">' +
          '<div style="font-size:2.2rem;margin-bottom:10px">🕐</div>' +
          '<div style="font-size:1rem;font-weight:700;color:#92400e;margin-bottom:6px">เงินเดือนยังไม่ออก</div>' +
          '<div style="font-size:.82rem;color:#b45309">' + monLabel + prdLabel + ' — รอการยืนยันจาก HR</div>' +
        '</div>';
      return;
    }

    // ── มีบันทึกโอนแล้ว → แสดงสลิป + banner + ประวัติ ──
    if (!ps) { preview.innerHTML = '<div style="color:#f87171;padding:12px">ไม่สามารถคำนวณได้</div>'; return; }

    // banner โอนแล้ว
    var latestPay = thisPays[0];
    // cache deductItems สำหรับ empViewSlip
    try { _empCachedSlipDeductJson = latestPay && latestPay.deductItems && latestPay.deductItems.length
      ? encodeURIComponent(JSON.stringify(latestPay.deductItems)) : ''; } catch(e2) { _empCachedSlipDeductJson = ''; }
    // ใช้ deductItems ที่บันทึกจริงตอน confirm (ไม่ recalculate) — ให้ตรงกับสลิป admin
    if (latestPay && latestPay.deductItems && latestPay.deductItems.length) {
      ps.loanDeductItems = latestPay.deductItems;
      ps.loanDeductTotal = latestPay.deductItems.reduce(function(s, x) { return s + (x.amount || 0); }, 0);
      ps.net = ps.gross - (ps.absentDeduct || 0) - (ps.offDeduct || 0) - ps.loanDeductTotal;
    }
    var fmt = (typeof _hrFmt === 'function') ? _hrFmt : function(v) { return parseFloat(v).toLocaleString('th-TH', {minimumFractionDigits:2}); };
    var bannerHtml =
      '<div style="background:linear-gradient(135deg,#059669,#10b981);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">' +
        '<div style="color:#fff">' +
          '<div style="font-size:.75rem;opacity:.85">✅ โอนแล้ว</div>' +
          '<div style="font-size:.9rem;font-weight:700">฿' + fmt(latestPay.amount) + '</div>' +
          '<div style="font-size:.72rem;opacity:.85">วันที่ ' + latestPay.transferDate + (latestPay.note ? ' · ' + latestPay.note : '') + '</div>' +
        '</div>' +
        (latestPay.slipUrl
          ? '<a href="' + latestPay.slipUrl + '" target="_blank" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:6px 12px;font-size:.8rem;font-weight:700;text-decoration:none;white-space:nowrap">🧾 ดูใบโอน</a>'
          : '') +
      '</div>';

    // ประวัติโอนทั้งหมดของเดือนนี้ (newest first)
    var histRows = thisPays.map(function(p, idx) {
      return '<tr style="' + (idx%2?'background:#f8fafc':'') + '">' +
        '<td style="padding:5px 8px;font-size:.77rem;color:#374151">' + p.transferDate + '</td>' +
        '<td style="padding:5px 8px;font-size:.77rem;text-align:right;color:#059669;font-weight:600">฿' + fmt(p.amount) + '</td>' +
        '<td style="padding:5px 8px;font-size:.77rem;color:#6b7280">' + (p.note||'—') + '</td>' +
      '</tr>';
    }).join('');
    var histHtml = thisPays.length > 1
      ? '<div style="margin-top:10px"><div style="font-size:.78rem;font-weight:700;color:#374151;margin-bottom:4px">📋 ประวัติการโอน</div>' +
          '<div style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden">' +
          '<table style="width:100%;border-collapse:collapse">' +
            '<thead><tr style="background:#f9fafb">' +
              '<th style="padding:5px 8px;font-size:.72rem;color:#6b7280;font-weight:600;text-align:left">วันที่</th>' +
              '<th style="padding:5px 8px;font-size:.72rem;color:#6b7280;font-weight:600;text-align:right">จำนวน</th>' +
              '<th style="padding:5px 8px;font-size:.72rem;color:#6b7280;font-weight:600;text-align:left">หมายเหตุ</th>' +
            '</tr></thead>' +
            '<tbody>' + histRows + '</tbody>' +
          '</table></div></div>'
      : '';

    var slipBase = att.length ? _empSlipPreviewHtml(ps, mon, latestPay) : '<div style="padding:16px;text-align:center;color:var(--t3);font-size:.85rem">ไม่พบข้อมูลเวลางานเดือนนี้</div>';
    var slipHtml = '<div style="position:relative">'
      + slipBase
      + '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:3;transform:rotate(-30deg)">'
      + '<span style="font-size:2.4rem;font-weight:900;color:rgba(34,197,94,0.22);white-space:nowrap;letter-spacing:3px;font-family:Sarabun,sans-serif">✅ โอนแล้ว</span>'
      + '</div></div>';
    preview.innerHTML = slipHtml + histHtml;

  }).catch(function(e) {
    preview.innerHTML = '<div style="color:#f87171;padding:12px;font-size:.82rem">❌ ' + (e.message || String(e)) + '</div>';
  });
}

  function sumRow(lbl, val, clr) {
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:2px solid #e2e8f0;margin-top:2px">'
      + '<span style="font-size:.84rem;font-weight:700;color:' + clr + '">' + lbl + '</span>'
      + '<span style="font-size:.9rem;font-weight:800;color:' + clr + '">฿' + fmt(val) + '</span>'
      + '</div>';
  }
  function statPill(val, lbl, bg, clr) {
    return '<div style="display:flex;flex-direction:column;align-items:center;background:' + bg + ';border-radius:10px;padding:7px 4px;flex:1;min-width:0">'
      + '<div style="font-size:.95rem;font-weight:800;color:' + clr + '">' + val + '</div>'
      + '<div style="font-size:.6rem;color:' + clr + ';opacity:.75;margin-top:1px;white-space:nowrap">' + lbl + '</div>'
      + '</div>';
  }

  var baseLabel = ps.type === 'daily' ? 'ค่าแรง (' + ps.present + ' วัน × ฿' + fmt(ps.dailyRate) + ')' : 'เงินเดือน';
  var incSection = incRow(baseLabel, ps.basePay);
  if (ps.otPayWD  > 0) incSection += incRow('OT ปกติ ('  + ps.otWDH  + ' ชม.)', ps.otPayWD);
  if (ps.otPaySun > 0) incSection += incRow('OT อาทิตย์ (' + ps.otSunH + ' ชม.)', ps.otPaySun);
  incSection += sumRow('รวมรายได้', ps.gross, '#059669');

  var dedSection = '';
  if (ps.absentDeduct > 0) dedSection += dedRow('ขาดงาน ' + ps.absent + ' วัน', ps.absentDeduct);
  if (ps.loanDeductItems && ps.loanDeductItems.length > 0) {
    ps.loanDeductItems.forEach(function(ld) { dedSection += dedRow(ld.label, ld.amount); });
  }
  if (dedSection) dedSection = sumRow('รวมหัก', ps.loanDeductTotal + (ps.absentDeduct||0), '#dc2626') + dedSection;

  var periodLabel = ps.periodLabel || ('ประจำเดือน ' + (ps.monthLabel || mon));

  // stats pills
  var statsHtml =
    '<div style="display:flex;gap:5px;padding:10px 14px;border-bottom:1px solid #e2e8f0">'
    + statPill(ps.present,           'มา',       '#dcfce7', '#166534')
    + statPill(ps.absent,            'ขาด',      ps.absent  > 0 ? '#fee2e2' : '#f8fafc', ps.absent  > 0 ? '#991b1b' : '#94a3b8')
    + statPill(ps.lateTimes,         'สายครั้ง', ps.lateTimes > 0 ? '#fef3c7' : '#f8fafc', ps.lateTimes > 0 ? '#92400e' : '#94a3b8')
    + statPill(ps.otWDH.toFixed(1),  'OT ปกติ', '#ede9fe', '#5b21b6')
    + statPill(ps.otSunH.toFixed(1), 'OT อา.',  '#fef9c3', '#92400e')
    + '</div>';

  // paid footer
  var paidFooter = paidInfo
    ? '<div style="background:linear-gradient(135deg,#065f46,#059669);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px">'
        + '<div>'
          + '<div style="font-size:.68rem;color:rgba(255,255,255,.75);margin-bottom:2px">✅ โอนเงินเดือนแล้ว</div>'
          + '<div style="font-size:1rem;font-weight:800;color:#fff">฿' + fmt(paidInfo.amount) + '</div>'
          + '<div style="font-size:.7rem;color:rgba(255,255,255,.75)">วันที่ ' + paidInfo.transferDate + (paidInfo.note ? ' · ' + paidInfo.note : '') + '</div>'
        + '</div>'
        + (paidInfo.slipUrl
            ? '<a href="' + paidInfo.slipUrl + '" target="_blank" style="background:rgba(255,255,255,.15);backdrop-filter:blur(4px);color:#fff;border:1.5px solid rgba(255,255,255,.35);border-radius:10px;padding:8px 14px;font-size:.8rem;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0">🧾 ดูใบโอน</a>'
            : '')
      + '</div>'
    : '';

  return '<div style="background:var(--bg-card);border:1.5px solid #c7d2fe;border-radius:18px;overflow:hidden;box-shadow:0 4px 24px rgba(99,102,241,.09)">'
    // ── Header ──
    + '<div style="background:linear-gradient(135deg,#1e3a8a,#1d4ed8,#3b82f6);padding:18px 18px 14px;text-align:center;color:#fff;position:relative">'
      + '<div style="font-size:.65rem;letter-spacing:2px;opacity:.7;text-transform:uppercase;margin-bottom:4px">' + company + '</div>'
      + '<div style="font-size:1.15rem;font-weight:900;letter-spacing:.5px">สลิปเงินเดือน</div>'
      + '<div style="display:inline-block;background:rgba(255,255,255,.15);border-radius:99px;padding:3px 12px;font-size:.75rem;margin-top:6px;opacity:.95">' + periodLabel + '</div>'
    + '</div>'
    // ── Employee info ──
    + '<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0">'
      + '<div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;flex-shrink:0">' + (ps.name ? ps.name.charAt(0) : '?') + '</div>'
      + '<div style="flex:1;min-width:0">'
        + '<div style="font-size:.88rem;font-weight:700;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + ps.name + '</div>'
        + '<div style="font-size:.72rem;color:#64748b;margin-top:1px">' + (ps.dept || '') + (ps.position ? ' · ' + ps.position : '') + '</div>'
      + '</div>'
    + '</div>'
    // ── Stats pills ──
    + statsHtml
    // ── Income ──
    + '<div style="padding:10px 16px 0">'
      + '<div style="font-size:.68rem;font-weight:700;color:#94a3b8;letter-spacing:1px;margin-bottom:4px">รายได้</div>'
      + incSection
    + '</div>'
    // ── Deductions ──
    + (dedSection
        ? '<div style="padding:6px 16px 0">'
            + '<div style="font-size:.68rem;font-weight:700;color:#94a3b8;letter-spacing:1px;margin-bottom:4px;margin-top:4px">รายการหัก</div>'
            + dedSection
          + '</div>'
        : '')
    // ── Net ──
    + '<div style="margin:12px 14px 0;background:linear-gradient(135deg,#065f46,#059669,#10b981);border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center">'
      + '<span style="color:rgba(255,255,255,.9);font-weight:700;font-size:.9rem">💰 รับสุทธิ</span>'
      + '<span style="color:#fff;font-weight:900;font-size:1.3rem">฿' + fmt(ps.net) + '</span>'
    + '</div>'
    // ── Paid footer ──
    + (paidFooter ? '<div style="margin:10px 14px 0;border-radius:12px;overflow:hidden">' + paidFooter + '</div>' : '')
    // ── Print button ──
    + '<div style="padding:12px 14px">'
      + '<button onclick="empViewSlip()" style="width:100%;padding:11px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;border-radius:12px;font-family:Sarabun,sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;letter-spacing:.3px;box-shadow:0 2px 8px rgba(59,130,246,.3)">🖨️ พิมพ์สลิป / บันทึก</button>'
    + '</div>'
  + '</div>';
}
// ── ATTENDANCE SUMMARY (read-only) ───────────────────────────
var _empAttMon = '';
var _empAttPeriod = 'all';

function _empRenderAttSummary() {
  var p = document.getElementById('empPanelSummary');
  if (!p) return;
  var now = new Date();
  if (!_empAttMon) _empAttMon = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');

  // Auto-select period
  var pc = (typeof _hrPayCfg === 'function') ? _hrPayCfg() : { mode: 'all' };
  if (pc.mode === 'semi' && _empAttPeriod === 'all') {
    _empAttPeriod = (now.getDate() >= pc.p1.start && now.getDate() <= pc.p1.end) ? 'p1' : 'p2';
  }

  p.innerHTML = _empAttHeaderHtml() + '<div id="empAttTable"><div style="padding:20px;text-align:center;color:var(--t3);font-size:.85rem">⏳ กำลังโหลด...</div></div>';
  _empLoadAttTable();
}

function _empAttHeaderHtml() {
  var pc = (typeof _hrPayCfg === 'function') ? _hrPayCfg() : { mode: 'all' };
  var periodBtns = pc.mode === 'semi'
    ? '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">' +
        _empAttPeriodBtn('all','ทั้งเดือน') +
        _empAttPeriodBtn('p1','งวด 1 ('+pc.p1.start+'-'+pc.p1.end+')') +
        _empAttPeriodBtn('p2','งวด 2 ('+pc.p2.start+'-'+pc.p2.end+')') +
      '</div>'
    : '';
  return '<div style="margin-bottom:12px">' +
    '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
      '<button onclick="_empAttPrev()" style="padding:5px 12px;border-radius:8px;border:1px solid var(--bc-input);background:transparent;color:var(--t2);cursor:pointer;font-size:.9rem">◀</button>' +
      '<div style="font-weight:700;font-size:.95rem;color:var(--c1);min-width:110px;text-align:center" id="empAttMonLabel">' + (typeof _hrMLab === 'function' ? _hrMLab(_empAttMon) : _empAttMon) + '</div>' +
      '<button onclick="_empAttNext()" style="padding:5px 12px;border-radius:8px;border:1px solid var(--bc-input);background:transparent;color:var(--t2);cursor:pointer;font-size:.9rem">▶</button>' +
    '</div>' + periodBtns +
  '</div>';
}

function _empAttPeriodBtn(val, label) {
  var sel = _empAttPeriod === val;
  return '<button onclick="_empAttSetPeriod(\'' + val + '\')" style="padding:6px 14px;border-radius:9px;border:1px solid ' + (sel ? 'var(--c1)' : 'var(--bc-input)') + ';background:' + (sel ? 'var(--c1)' : 'transparent') + ';color:' + (sel ? '#fff' : 'var(--t3)') + ';font-family:Sarabun,sans-serif;font-size:.8rem;cursor:pointer">' + label + '</button>';
}

function _empAttSetPeriod(val) {
  _empAttPeriod = val;
  var p = document.getElementById('empPanelSummary');
  if (p) { p.innerHTML = _empAttHeaderHtml() + '<div id="empAttTable"><div style="padding:20px;text-align:center;color:var(--t3);font-size:.85rem">⏳ กำลังโหลด...</div></div>'; }
  _empLoadAttTable();
}

function _empAttPrev() {
  var mp = _empAttMon.split('-').map(Number);
  var m = mp[1] - 1; var y = mp[0];
  if (m < 1) { m = 12; y--; }
  _empAttMon = y + '-' + String(m).padStart(2,'0');
  _empRenderAttSummary();
}

function _empAttNext() {
  var mp = _empAttMon.split('-').map(Number);
  var m = mp[1] + 1; var y = mp[0];
  if (m > 12) { m = 1; y++; }
  _empAttMon = y + '-' + String(m).padStart(2,'0');
  _empRenderAttSummary();
}

function _empLoadAttTable() {
  if (!_hrSession) return;
  var empId = String(_hrSession.empId);
  var months = [_empAttMon];
  var pc = (typeof _hrPayCfg === 'function') ? _hrPayCfg() : { mode: 'all' };
  if (_empAttPeriod === 'p2' && pc.mode === 'semi') {
    var mp = _empAttMon.split('-').map(Number);
    var pM = mp[1] === 1 ? 12 : mp[1] - 1;
    var pY = mp[1] === 1 ? mp[0] - 1 : mp[0];
    months.push(pY + '-' + String(pM).padStart(2,'0'));
  }
  Promise.all(months.map(function(m) { return _hrGET('getHRAttendance', { month: m }); }))
    .then(function(results) {
      var allRows = results.reduce(function(a, r) { return a.concat(r.data || []); }, []);
      var rows = allRows.filter(function(r) { return String(r.empId) === empId; });
      rows = (typeof _hrFilterByPeriod === 'function') ? _hrFilterByPeriod(rows, _empAttPeriod, _empAttMon) : rows;
      // Sort by       // Sort by date
      rows.sort(function(a, b) {
        var pa = String(a.date||'').split('/'), pb = String(b.date||'').split('/');
        var da = new Date(parseInt(pa[2]) - (parseInt(pa[2])>2500?543:0), parseInt(pa[1])-1, parseInt(pa[0]));
        var db = new Date(parseInt(pb[2]) - (parseInt(pb[2])>2500?543:0), parseInt(pb[1])-1, parseInt(pb[0]));
        return da - db;
      });
      var tbl = document.getElementById('empAttTable');
      if (tbl) tbl.innerHTML = _empAttTableHtml(rows);
    }).catch(function(e) {
      var tbl = document.getElementById('empAttTable');
      if (tbl) tbl.innerHTML = '<div style="color:#f87171;font-size:.82rem">❌ ' + (e.message || String(e)) + '</div>';
    });
}

function _empAttTableHtml(rows) {
  if (!rows.length) return '<div style="padding:28px 16px;text-align:center;color:var(--t3);font-size:.85rem">ไม่พบข้อมูลเดือนนี้<br><span style="font-size:.78rem">กรุณาติดต่อ HR หากมีข้อสงสัย</span></div>';

  var present = 0, absent = 0, late = 0, lateMin = 0, otH = 0;
  rows.forEach(function(r) {
    if (r.status === 'present') present++;
    else if (r.status === 'absent') absent++;
    if ((parseInt(r.lateMin)||0) > 0) { late++; lateMin += parseInt(r.lateMin)||0; }
    otH += parseFloat(r.otHours)||0;
  });

  // Stat card — gradient bg
  var statCard = function(val, label, bg, textClr) {
    return '<div style="flex:1;text-align:center;padding:10px 4px 8px;background:' + bg + ';border-radius:12px;box-shadow:0 1px 5px rgba(0,0,0,.07)">' +
      '<div style="font-size:1.25rem;font-weight:800;color:' + textClr + ';line-height:1.1">' + val + '</div>' +
      '<div style="font-size:.62rem;font-weight:600;color:' + textClr + ';opacity:.7;margin-top:3px;letter-spacing:.2px">' + label + '</div>' +
    '</div>';
  };

  // Status badge
  var statusBadge = function(s) {
    if (s === 'present') return '<span style="display:inline-block;background:#dcfce7;color:#166534;font-size:.69rem;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap">✓ มา</span>';
    if (s === 'absent')  return '<span style="display:inline-block;background:#fee2e2;color:#991b1b;font-size:.69rem;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap">✗ ขาด</span>';
    return '<span style="display:inline-block;background:#f1f5f9;color:#64748b;font-size:.69rem;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap">🏖 หยุด</span>';
  };

  // Late pill
  var latePill = function(m) {
    if (!m) return '<span style="color:#cbd5e1;font-size:.78rem">—</span>';
    return '<span style="display:inline-block;background:#fef3c7;color:#92400e;font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:99px">' + m + ' น.</span>';
  };

  // OT pill
  var otPill = function(h) {
    if (!h) return '<span style="color:#cbd5e1;font-size:.78rem">—</span>';
    return '<span style="display:inline-block;background:#ede9fe;color:#4c1d95;font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:99px">' + h.toFixed(1) + ' ชม.</span>';
  };

  var dayRows = rows.map(function(r, i) {
    var late_m  = parseInt(r.lateMin) || 0;
    var ot_h    = parseFloat(r.otHours) || 0;
    var dowIdx  = parseInt(r.dow) || 0;
    var isSun   = dowIdx === 0;
    var isSat   = dowIdx === 6;
    var isHol   = r.status === 'holiday';
    var rowBg   = isSun ? '#fff1f2' : isSat ? '#fffbeb' : (i % 2 === 0 ? 'transparent' : 'rgba(0,0,0,.018)');
    var leftBdr = isSun ? 'border-left:3px solid #f87171;' : isSat ? 'border-left:3px solid #fbbf24;' : 'border-left:3px solid transparent;';
    var dateClr = isSun ? '#ef4444' : isSat ? '#d97706' : 'var(--t2)';
    var dateW   = (isSun || isSat) ? '700' : '500';
    // Short date: "01 มิ.ย." style
    var thM = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    var dp = String(r.date||'').split('/');
    var shortDate = dp.length === 3 ? dp[0] + ' ' + (thM[parseInt(dp[1])] || dp[1]) : (r.date||'—');
    return '<tr style="background:' + rowBg + ';' + leftBdr + '">' +
      '<td style="padding:8px 6px 8px 10px;font-size:.8rem;font-weight:' + dateW + ';color:' + dateClr + ';white-space:nowrap">' + shortDate + '</td>' +
      '<td style="padding:8px 4px;font-size:.85rem;font-weight:700;color:var(--t1);letter-spacing:.3px">' + (r.clockIn||'—') + '</td>' +
      '<td style="padding:8px 4px;font-size:.82rem;color:var(--t2)">' + (r.lastScan||r.clockOut||'—') + '</td>' +
      '<td style="padding:8px 4px">' + statusBadge(r.status) + '</td>' +
      '<td style="padding:8px 4px">' + latePill(late_m) + '</td>' +
      '<td style="padding:8px 4px">' + otPill(ot_h) + '</td>' +
    '</tr>';
  }).join('');

  var absBg  = absent > 0 ? 'linear-gradient(135deg,#fee2e2,#fecaca)' : 'var(--bg-card)';
  var absClr = absent > 0 ? '#991b1b' : 'var(--t3)';
  var lateBg = late > 0 ? 'linear-gradient(135deg,#fef3c7,#fde68a)' : 'var(--bg-card)';
  var lateClr= late > 0 ? '#92400e' : 'var(--t3)';

  return '<div style="display:flex;gap:6px;margin-bottom:12px">' +
    statCard(present,        'วันมา',    'linear-gradient(135deg,#dcfce7,#bbf7d0)', '#166534') +
    statCard(absent,         'วันขาด',   absBg,  absClr) +
    statCard(late,           'ครั้งสาย', lateBg, lateClr) +
    statCard(otH.toFixed(1), 'ชม. OT',  'linear-gradient(135deg,#ede9fe,#ddd6fe)', '#4c1d95') +
  '</div>' +
  '<div style="overflow-x:auto;border-radius:12px;border:1px solid var(--bc-card);overflow:hidden">' +
  '<table style="width:100%;border-collapse:collapse;min-width:300px">' +
    '<thead><tr style="background:linear-gradient(135deg,#1e3a5f,#1d4ed8)">' +
      '<th style="padding:8px 6px 8px 10px;font-size:.7rem;color:rgba(255,255,255,.85);text-align:left;font-weight:600;white-space:nowrap">📅 วันที่</th>' +
      '<th style="padding:8px 4px;font-size:.7rem;color:rgba(255,255,255,.85);text-align:left;font-weight:600">เข้า</th>' +
      '<th style="padding:8px 4px;font-size:.7rem;color:rgba(255,255,255,.85);text-align:left;font-weight:600">ออก</th>' +
      '<th style="padding:8px 4px;font-size:.7rem;color:rgba(255,255,255,.85);text-align:left;font-weight:600">สถานะ</th>' +
      '<th style="padding:8px 4px;font-size:.7rem;color:rgba(255,255,255,.85);text-align:left;font-weight:600">สาย</th>' +
      '<th style="padding:8px 4px;font-size:.7rem;color:rgba(255,255,255,.85);text-align:left;font-weight:600">OT</th>' +
    '</tr></thead>' +
    '<tbody>' + dayRows + '</tbody>' +
  '</table></div>';
}


</script>


<script>
// ── Service Worker registration + auto-update ──────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(function(reg) {
    reg.addEventListener('updatefound', fu
